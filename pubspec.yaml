name: recliq_agent
description: "R-Agent - Fintech Agent Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  mobx: ^2.3.0
  flutter_mobx: ^2.2.0

  # Dependency Injection
  get_it: ^7.6.7
  injectable: ^2.3.2

  # Networking
  dio: ^5.4.0

  # Functional Programming
  dartz: ^0.10.1

  # Code Generation Annotations
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # UI/UX
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.1.0
  image_picker: ^1.0.7
  shimmer: ^3.0.0
  fluttertoast: ^8.2.4
  fl_chart: ^0.66.2
  cached_network_image: ^3.3.1
  lottie: ^3.1.0

  # Location
  geolocator: ^11.0.0
  geocoding: ^2.1.1

  # Local Auth (Biometric)
  local_auth: ^2.2.0

  # Navigation
  go_router: ^14.2.0

  # Intl
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.8
  mobx_codegen: ^2.6.0
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  injectable_generator: ^2.4.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app-launcher-agent.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
